name: Release

on:
  workflow_dispatch:

jobs:
  pack:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Judgy.slnx

      - name: Build
        run: dotnet build Judgy.slnx -c Release --no-restore -p:ContinuousIntegrationBuild=true

      - name: Pack
        run: dotnet pack Judgy.slnx -c Release --no-build -p:ContinuousIntegrationBuild=true -o artifacts/packages

      - name: Upload packages
        uses: actions/upload-artifact@v6
        with:
          name: packages
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
          if-no-files-found: error
