name: Release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment:
      name: nuget-org

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Determine release version
        id: version
        run: |
          version=$(grep -oPm1 '(?<=<Version>)[^<]+' Directory.Build.props)
          if [ -z "$version" ]; then
            echo "Could not determine package version from Directory.Build.props"
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore Judgy.slnx

      - name: Build
        run: dotnet build Judgy.slnx -c Release --no-restore -p:ContinuousIntegrationBuild=true

      - name: Pack
        run: dotnet pack Judgy.slnx -c Release --no-build -p:ContinuousIntegrationBuild=true -o artifacts/packages

      - name: Ensure publish runs from master
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/master" ]; then
            echo "NuGet publishing is only allowed from master. Current ref: ${GITHUB_REF}"
            exit 1
          fi

      - name: Publish packages to NuGet.org
        env:
          NUGET_ORG_API_KEY: ${{ secrets.NUGET_ORG_API_KEY }}
        run: |
          dotnet nuget push "artifacts/packages/*.nupkg" \
            --source "https://api.nuget.org/v3/index.json" \
            --api-key "$NUGET_ORG_API_KEY" \
            --skip-duplicate

          dotnet nuget push "artifacts/packages/*.snupkg" \
            --source "https://api.nuget.org/v3/index.json" \
            --api-key "$NUGET_ORG_API_KEY" \
            --skip-duplicate

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            artifacts/packages/*.nupkg \
            artifacts/packages/*.snupkg \
            --target "$GITHUB_SHA" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes

      - name: Upload packages
        uses: actions/upload-artifact@v6
        with:
          name: packages
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
          if-no-files-found: error
