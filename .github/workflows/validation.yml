name: Validation

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validation:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Judgy.slnx

      - name: Build
        run: dotnet build Judgy.slnx -c Release --no-restore -p:ContinuousIntegrationBuild=true

      - name: Test
        run: dotnet test Judgy.slnx -c Release --no-build --logger trx --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: TestResults
          if-no-files-found: ignore
